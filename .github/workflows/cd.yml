name: Continuous Deployment

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes antes do deploy
        run: |
          pip install pytest httpx
          pytest

      - name: Simulando Deploy em Produção
        run: |
          echo "Conectando ao servidor de produção..."
          echo "Instalando a nova versão da API de Tarefas..."
          echo "Deploy realizado com sucesso para o ambiente de produção!"

      - name: Notificar Discord (Deploy OK)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"🚀 Deploy realizado com sucesso!\n👤 Autor: ${{ github.actor }}\n🔗 Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notificar Discord (Deploy Falhou)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"Deploy falhou!\n👤 Autor: ${{ github.actor }}\n🔗 Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}