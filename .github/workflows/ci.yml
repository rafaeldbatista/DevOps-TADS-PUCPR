name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic
          pip install -r requirements.txt

      - name: Lint com flake8 (Qualidade de Código)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Ajustar PYTHONPATH
        run: |
          echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Testes com pytest
        run: |
          pip install pytest pytest-cov pytest-asyncio
          pytest
      - name: Notificar Discord (Sucesso)
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"CI passou!\n Autor: ${{ github.actor }}\n🔗 Repo: ${{ github.repository }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notificar Discord (Falha)
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{\"content\": \"CI falhou!\n Autor: ${{ github.actor }}\n🔗 Repo: ${{ github.repository }}\"}" \
          ${{ secrets.DISCORD_WEBHOOK }}
